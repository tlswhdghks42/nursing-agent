<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>간호 노트 에이전트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap');

:root {
  --bg: #f2efe8;
  --paper: #fffef9;
  --ink: #1c1c1e;
  --accent: #2d5d8a;
  --accent-light: #e8f0f8;
  --red: #c0392b;
  --yellow-hl: #fff9c4;
  --yellow-b: #f9a825;
  --blue: #1565c0;
  --green: #2e7d32;
  --border: #ddd8ce;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--ink);
}

/* ── HEADER ── */
.header {
  background: var(--accent);
  padding: 0 32px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.18);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 1rem; font-weight: 700; color: #fff; }
.header p { font-size: 0.72rem; color: rgba(255,255,255,0.7); margin-top: 1px; }
.step-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
}
.step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700;
  background: rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.6);
  transition: all 0.3s;
}
.step-dot.active { background: #fff; color: var(--accent); }
.step-dot.done { background: rgba(255,255,255,0.9); color: var(--green); }
.step-line { width: 20px; height: 1px; background: rgba(255,255,255,0.3); }

/* ── MAIN ── */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 24px;
}

/* ── STEP PANELS ── */
.step-panel {
  display: none;
  animation: fadeIn 0.35s ease;
}
.step-panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── CARD ── */
.card {
  background: var(--paper);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 20px;
}
.card-hd {
  padding: 14px 22px;
  background: #eeebe3;
  border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
  font-weight: 700;
  color: #555;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-body { padding: 22px; }

/* ── STEP 1: UPLOAD ── */
.upload-zone {
  border: 2px dashed #ccc8be;
  border-radius: 12px;
  padding: 36px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: #fafaf7;
  color: #aaa;
}
.upload-zone:hover, .upload-zone.drag {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
}
.upload-zone input { display: none; }
.upload-icon { font-size: 2.8rem; margin-bottom: 10px; }
.upload-zone h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
.upload-zone p { font-size: 0.8rem; line-height: 1.6; }
.upload-zone small { font-size: 0.72rem; color: #bbb; }

.file-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.file-card {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  background: var(--accent-light);
  border: 1px solid #c5d9e8;
  border-radius: 10px;
  font-size: 0.8rem;
}
.fc-icon { font-size: 1.4rem; flex-shrink: 0; }
.fc-info { flex: 1; min-width: 0; }
.fc-name { font-weight: 600; color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fc-type { font-size: 0.7rem; margin-top: 3px; display: flex; align-items: center; gap: 6px; }
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 10px;
  font-size: 0.68rem; font-weight: 700;
}
.badge.lecture  { background: #e3f2fd; color: #0d47a1; }
.badge.textbook { background: #fff3e0; color: #e65100; }
.badge.pending  { background: #f5f5f5; color: #999; }
.fc-rm {
  background: none; border: none; cursor: pointer;
  color: #bbb; font-size: 0.9rem; padding: 4px 8px;
  border-radius: 6px; flex-shrink: 0;
}
.fc-rm:hover { background: #fdd; color: var(--red); }

.btn-add-more {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 9px;
  border: 1.5px dashed #ccc; border-radius: 8px;
  background: none; font-family: inherit;
  font-size: 0.78rem; color: #999;
  cursor: pointer; transition: all 0.18s; margin-top: 10px;
}
.btn-add-more:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* ── STEP 2: OUTLINE ── */
.outline-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.outline-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: #fafaf7;
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: border 0.2s;
}
.outline-item:focus-within { border-color: var(--accent); }
.outline-num {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 0.72rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.outline-content { flex: 1; }
.outline-title {
  font-weight: 700; font-size: 0.88rem; margin-bottom: 4px;
}
.outline-desc {
  font-size: 0.78rem; color: #777; line-height: 1.5;
}
.outline-edit {
  width: 100%; border: none; background: none;
  font-family: inherit; font-size: 0.88rem; font-weight: 700;
  color: var(--ink); outline: none; resize: none;
}
.outline-edit-desc {
  width: 100%; border: none; background: none;
  font-family: inherit; font-size: 0.78rem; color: #777;
  outline: none; resize: none; line-height: 1.5; margin-top: 3px;
}

.ai-message {
  background: var(--accent-light);
  border: 1px solid #c5d9e8;
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 0.83rem;
  line-height: 1.7;
  color: #1a3a5c;
  margin-bottom: 16px;
}
.ai-message strong { color: var(--accent); }

/* ── STEP 3: SECTION BY SECTION ── */
.section-progress {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.sec-pip {
  width: 32px; height: 6px;
  border-radius: 3px;
  background: #ddd;
  transition: background 0.3s;
}
.sec-pip.done   { background: var(--green); }
.sec-pip.active { background: var(--accent); }

.section-card {
  background: var(--paper);
  border-radius: var(--radius);
  border: 2px solid var(--accent);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 16px;
}
.section-card-hd {
  padding: 12px 20px;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.section-card-hd h3 { font-size: 0.9rem; font-weight: 700; }
.section-card-hd span { font-size: 0.72rem; opacity: 0.8; }
.section-card-body { padding: 20px; }

/* NOTE CONTENT */
.note-two-col {
  display: grid;
  grid-template-columns: 1fr 1px 1fr;
  gap: 0 20px;
}
.note-col-div { background: #ddd; }
.note-col { padding: 0 2px; }
.note-sec-title {
  font-weight: 700; font-size: 0.84rem;
  border-bottom: 1px solid #ddd;
  padding-bottom: 3px; margin: 12px 0 6px;
  color: #111;
}
.note-sec-title:first-child { margin-top: 0; }
.note-item {
  font-size: 0.78rem; line-height: 1.65;
  margin-bottom: 4px;
  padding: 1px 6px 1px 8px;
  border-left: 2px solid transparent;
  border-radius: 2px;
}
.note-item::before { content: '· '; }
.note-item.imp  { color: var(--red); border-left-color: var(--red); }
.note-item.exam { background: var(--yellow-hl); border-left-color: var(--yellow-b); }
.note-item.add  { color: var(--blue); border-left-color: var(--blue); }
.note-item.tip  { color: var(--green); border-left-color: var(--green); font-style: italic; }

/* FEEDBACK */
.feedback-area {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.feedback-input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.82rem;
  background: #fafaf7;
  outline: none;
  resize: none;
  min-height: 44px;
  transition: border 0.2s;
  line-height: 1.5;
}
.feedback-input:focus { border-color: var(--accent); }
.feedback-input::placeholder { color: #bbb; }

/* ── BUTTONS ── */
.btn {
  padding: 11px 22px;
  border: none; border-radius: 8px;
  font-family: inherit; font-size: 0.85rem; font-weight: 700;
  cursor: pointer; transition: all 0.18s;
  display: inline-flex; align-items: center; gap: 7px;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #1e4570; }
.btn-primary:disabled { background: #aaa; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: none; color: var(--accent);
  border: 1.5px solid var(--accent);
}
.btn-ghost:hover { background: var(--accent-light); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #962d22; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #1b5e20; }
.btn-sm { padding: 7px 14px; font-size: 0.77rem; }

.btn-row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

/* ── STEP 4: FINAL ── */
.final-note {
  max-width: 740px;
  margin: 0 auto;
}
.final-title-bar {
  text-align: center;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 2.5px solid var(--ink);
}
.final-title-bar h2 {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.2rem; font-weight: 700;
}
.final-meta { font-size: 0.72rem; color: #999; margin-top: 4px; }

/* ── LOADING ── */
.loading-inline {
  display: flex; align-items: center; gap: 10px;
  padding: 16px; color: #777; font-size: 0.83rem;
}
.spinner-sm {
  width: 18px; height: 18px;
  border: 2px solid #ddd;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── LEGEND ── */
.legend {
  display: flex; flex-wrap: wrap;
  gap: 8px 18px;
  padding: 10px 32px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  font-size: 0.72rem; color: #666;
}
.legend span { display: flex; align-items: center; gap: 5px; }
.ldot { width: 9px; height: 9px; border-radius: 50%; }

/* ── MISC ── */
.title-inputs {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.title-inputs input {
  flex: 1; padding: 10px 14px;
  border: 1px solid var(--border); border-radius: 8px;
  font-family: inherit; font-size: 0.85rem;
  background: #fafaf7; outline: none; transition: border 0.2s;
}
.title-inputs input:focus { border-color: var(--accent); }

.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 9px; border-radius: 10px;
  font-size: 0.68rem; font-weight: 700;
}
.tag.mixed   { background: #f3e5f5; color: #6a1b9a; }
.tag.lecture { background: #e3f2fd; color: #0d47a1; }
.tag.textbook{ background: #fff3e0; color: #e65100; }

@media print {
  body { background: #fff; }
  .header, .legend, #step1, #step2, #step3,
  .btn-row, .feedback-area { display: none !important; }
  .step-panel { display: block !important; }
  #step4 .card { box-shadow: none; border: none; }
  .card-body { padding: 0; }
}
@media (max-width: 700px) {
  .note-two-col { grid-template-columns: 1fr; }
  .note-col-div { display: none; }
  .main { padding: 16px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div style="font-size:1.4rem">📋</div>
    <div>
      <div class="header h1" style="font-size:1rem;font-weight:700;color:#fff">간호 노트 에이전트</div>
      <div style="font-size:0.72rem;color:rgba(255,255,255,0.7);margin-top:1px">PDF → 단계별 검토 → 완성 노트</div>
    </div>
  </div>
  <div class="step-indicator">
    <div class="step-dot active" id="sd1">1</div>
    <div class="step-line"></div>
    <div class="step-dot" id="sd2">2</div>
    <div class="step-line"></div>
    <div class="step-dot" id="sd3">3</div>
    <div class="step-line"></div>
    <div class="step-dot" id="sd4">4</div>
  </div>
</div>

<div class="legend">
  <span><div class="ldot" style="background:#1a1a1a"></div> 목차/타이틀</span>
  <span><div class="ldot" style="background:#c0392b"></div> 교수 강조</span>
  <span><div class="ldot" style="background:#f9a825"></div> 시험 출제</span>
  <span><div class="ldot" style="background:#1565c0"></div> 보충 설명</span>
  <span><div class="ldot" style="background:#2e7d32"></div> 암기 팁</span>
</div>

<div class="main">

  <!-- ── STEP 1: UPLOAD ── -->
  <div class="step-panel active" id="step1">
    <div class="title-inputs">
      <input type="text" id="noteTitle" placeholder="노트 제목 (예: 내분비계 - 당뇨병)">
      <input type="text" id="noteDate" placeholder="날짜" style="max-width:140px">
    </div>

    <div class="card">
      <div class="card-hd">📄 STEP 1 — PDF 업로드</div>
      <div class="card-body">
        <div class="upload-zone" id="dropZone"
             onclick="document.getElementById('fileInput').click()"
             ondragover="onDrag(event)" ondragleave="offDrag()" ondrop="onDrop(event)">
          <input type="file" id="fileInput" accept=".pdf" multiple onchange="handleFiles(event)">
          <div class="upload-icon">📂</div>
          <h3>PDF 파일을 드롭하거나 클릭해서 선택</h3>
          <p>강의안 · 교재 필기 PDF<br>여러 개 동시 선택 가능</p>
          <small style="display:block;margin-top:8px">업로드하면 AI가 강의안/교재 자동 구분</small>
        </div>
        <div class="file-list" id="fileList"></div>
        <button class="btn-add-more" id="addMoreBtn" style="display:none"
                onclick="document.getElementById('fileInput').click()">＋ PDF 추가</button>
      </div>
    </div>

    <div class="btn-row" style="justify-content:flex-end">
      <button class="btn btn-primary" id="step1Btn" onclick="goStep2()" disabled>
        다음 단계 — 목차 확인 →
      </button>
    </div>
  </div>

  <!-- ── STEP 2: OUTLINE ── -->
  <div class="step-panel" id="step2">
    <div class="card">
      <div class="card-hd">🗂 STEP 2 — AI가 분석한 목차 확인 · 수정</div>
      <div class="card-body">
        <div class="ai-message" id="aiMessage">
          <div class="loading-inline"><div class="spinner-sm"></div> PDF를 분석하고 있어요...</div>
        </div>
        <div class="outline-grid" id="outlineGrid"></div>
      </div>
    </div>
    <div class="btn-row" style="justify-content:space-between">
      <button class="btn btn-ghost" onclick="goStep(1)">← 돌아가기</button>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="addOutlineItem()">＋ 섹션 추가</button>
        <button class="btn btn-primary" id="step2Btn" onclick="goStep3()" disabled>
          이 목차로 노트 생성 →
        </button>
      </div>
    </div>
  </div>

  <!-- ── STEP 3: SECTION BY SECTION ── -->
  <div class="step-panel" id="step3">
    <div class="card">
      <div class="card-hd">✏️ STEP 3 — 섹션별 검토 · 수정</div>
      <div class="card-body">
        <div class="section-progress" id="sectionProgress"></div>
        <div id="sectionContainer"></div>
      </div>
    </div>
    <div class="btn-row" style="justify-content:space-between" id="step3Actions">
      <button class="btn btn-ghost" onclick="goStep(2)">← 목차 수정</button>
      <button class="btn btn-green" id="finishBtn" onclick="goStep4()" style="display:none">
        ✅ 노트 완성
      </button>
    </div>
  </div>

  <!-- ── STEP 4: FINAL ── -->
  <div class="step-panel" id="step4">
    <div class="card">
      <div class="card-hd" style="justify-content:space-between">
        <span>📄 STEP 4 — 완성된 노트</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-ghost" onclick="goStep(3)">← 다시 수정</button>
          <button class="btn btn-sm btn-danger" onclick="window.print()">🖨️ 인쇄</button>
          <button class="btn btn-sm btn-green" onclick="downloadPDF()">⬇️ PDF 저장</button>
        </div>
      </div>
      <div class="card-body">
        <div id="finalNote"></div>
      </div>
    </div>
  </div>

</div><!-- /main -->

<script>
// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const API = '/api/claude';
let files    = [];   // [{name, b64, type:'lecture'|'textbook'|null}]
let outline  = [];   // [{title, desc}]
let sections = [];   // [{title, note:{left,right}, done:bool}]
let currentSec = 0;

// ════════════════════════════════════════
// API HELPER
// ════════════════════════════════════════
async function callClaude(body) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, model: 'claude-sonnet-4-20250514', max_tokens: 1000 })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data.content.map(i => i.text || '').join('');
}

function parseJSON(txt) {
  return JSON.parse(txt.replace(/```json|```/g, '').trim());
}

// ════════════════════════════════════════
// STEP NAVIGATION
// ════════════════════════════════════════
function goStep(n) {
  document.querySelectorAll('.step-panel').forEach((el,i) =>
    el.classList.toggle('active', i+1 === n));
  ['sd1','sd2','sd3','sd4'].forEach((id,i) => {
    const el = document.getElementById(id);
    el.className = 'step-dot' + (i+1 < n ? ' done' : i+1 === n ? ' active' : '');
  });
  window.scrollTo(0,0);
}

// ════════════════════════════════════════
// FILE HANDLING
// ════════════════════════════════════════
function onDrag(e)  { e.preventDefault(); document.getElementById('dropZone').classList.add('drag'); }
function offDrag()  { document.getElementById('dropZone').classList.remove('drag'); }
function onDrop(e)  { e.preventDefault(); offDrag(); addFiles(Array.from(e.dataTransfer.files)); }
function handleFiles(e) { addFiles(Array.from(e.target.files)); e.target.value = ''; }

function addFiles(newFiles) {
  newFiles.filter(f => f.name.endsWith('.pdf')).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const b64 = e.target.result.split(',')[1];
      const entry = { name: file.name, b64, type: null };
      files.push(entry);
      renderFileList();
      detectType(entry);
    };
    reader.readAsDataURL(file);
  });
}

async function detectType(entry) {
  try {
    const txt = await callClaude({
      messages: [{
        role: 'user',
        content: [
          { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: entry.b64 } },
          { type: 'text', text: '이 PDF가 교수 강의안(PPT/슬라이드)인가요, 교재/참고서 필기본인가요? "lecture" 또는 "textbook" 중 하나만 답하세요.' }
        ]
      }]
    });
    entry.type = txt.toLowerCase().includes('textbook') ? 'textbook' : 'lecture';
  } catch { entry.type = 'lecture'; }
  renderFileList();
  updateStep1Btn();
}

function renderFileList() {
  const list = document.getElementById('fileList');
  const addBtn = document.getElementById('addMoreBtn');
  if (!files.length) { list.innerHTML = ''; addBtn.style.display='none'; return; }
  addBtn.style.display = '';
  list.innerHTML = files.map((f,i) => {
    const badge = f.type === 'textbook'
      ? `<span class="badge textbook">📚 교재 필기</span>`
      : f.type === 'lecture'
        ? `<span class="badge lecture">📑 강의안</span>`
        : `<span class="badge pending">⏳ 분석 중...</span>`;
    return `<div class="file-card">
      <span class="fc-icon">📄</span>
      <div class="fc-info">
        <div class="fc-name" title="${f.name}">${f.name}</div>
        <div class="fc-type">${badge}</div>
      </div>
      <button class="fc-rm" onclick="removeFile(${i})">✕</button>
    </div>`;
  }).join('');
}

function removeFile(i) {
  files.splice(i,1);
  renderFileList();
  updateStep1Btn();
}

function updateStep1Btn() {
  const allDone = files.length > 0 && files.every(f => f.type !== null);
  document.getElementById('step1Btn').disabled = !allDone;
}

// ════════════════════════════════════════
// STEP 2 — OUTLINE
// ════════════════════════════════════════
async function goStep2() {
  goStep(2);
  document.getElementById('step2Btn').disabled = true;
  document.getElementById('outlineGrid').innerHTML = '';
  document.getElementById('aiMessage').innerHTML =
    `<div class="loading-inline"><div class="spinner-sm"></div> PDF 전체를 분석해 목차를 구성하고 있어요...</div>`;

  // Build content blocks from all files
  const contentBlocks = [];
  files.forEach(f => {
    contentBlocks.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: f.b64 } });
  });
  contentBlocks.push({
    type: 'text',
    text: `위 PDF들을 분석해 간호학 노트의 목차(섹션 구성)를 JSON으로 출력하세요.
섹션은 주요 학습 단위로 나누세요 (예: 병태생리, 증상/징후, 진단, 치료/간호 등).
교재와 강의안이 섞여 있으면 통합해서 구성하세요.

출력 형식 (JSON만):
{"sections":[{"title":"섹션명","desc":"이 섹션에서 다룰 내용 한 줄 요약"}]}

JSON만 출력.`
  });

  try {
    const txt = await callClaude({ messages: [{ role: 'user', content: contentBlocks }] });
    const data = parseJSON(txt);
    outline = data.sections;

    const types = files.map(f => f.type);
    const tagHTML = types.includes('lecture') && types.includes('textbook')
      ? `<span class="tag mixed">📑 강의안 + 📚 교재 통합</span>`
      : types.includes('textbook')
        ? `<span class="tag textbook">📚 교재 필기</span>`
        : `<span class="tag lecture">📑 강의안</span>`;

    document.getElementById('aiMessage').innerHTML = `
      ${tagHTML}
      <p style="margin-top:10px">총 <strong>${outline.length}개 섹션</strong>으로 구성했어요.<br>
      섹션 제목이나 설명을 직접 수정하거나, 불필요한 섹션을 삭제할 수 있어요.<br>
      확인이 끝나면 <strong>이 목차로 노트 생성</strong>을 눌러주세요.</p>`;

    renderOutline();
    document.getElementById('step2Btn').disabled = false;
  } catch(e) {
    document.getElementById('aiMessage').innerHTML = `⚠️ 오류: ${e.message}`;
  }
}

function renderOutline() {
  document.getElementById('outlineGrid').innerHTML = outline.map((sec,i) => `
    <div class="outline-item" id="oi-${i}">
      <div class="outline-num">${i+1}</div>
      <div class="outline-content">
        <textarea class="outline-edit" rows="1"
          oninput="outline[${i}].title=this.value;autoResize(this)"
          onkeydown="if(event.key==='Enter')event.preventDefault()"
        >${sec.title}</textarea>
        <textarea class="outline-edit-desc" rows="2"
          oninput="outline[${i}].desc=this.value;autoResize(this)"
        >${sec.desc}</textarea>
      </div>
      <button class="fc-rm" onclick="removeOutlineItem(${i})" title="섹션 삭제">✕</button>
    </div>`).join('');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function removeOutlineItem(i) {
  outline.splice(i,1);
  renderOutline();
}

function addOutlineItem() {
  outline.push({ title: '새 섹션', desc: '내용을 입력하세요' });
  renderOutline();
  setTimeout(() => {
    const items = document.querySelectorAll('.outline-edit');
    const last = items[items.length-1];
    if (last) { last.focus(); last.select(); }
  }, 50);
}

// ════════════════════════════════════════
// STEP 3 — SECTION BY SECTION
// ════════════════════════════════════════
async function goStep3() {
  // Sync any edits from textareas
  document.querySelectorAll('.outline-item').forEach((el,i) => {
    const tas = el.querySelectorAll('textarea');
    if (tas[0]) outline[i].title = tas[0].value;
    if (tas[1]) outline[i].desc  = tas[1].value;
  });

  sections = outline.map(o => ({ title: o.title, desc: o.desc, note: null, done: false }));
  currentSec = 0;
  goStep(3);
  renderProgressPips();
  await generateSection(0);
}

function renderProgressPips() {
  document.getElementById('sectionProgress').innerHTML =
    sections.map((s,i) =>
      `<div class="sec-pip ${s.done ? 'done' : i === currentSec ? 'active' : ''}" id="pip-${i}" title="${s.title}"></div>`
    ).join('');
}

function updatePip(i, state) {
  const el = document.getElementById(`pip-${i}`);
  if (el) el.className = `sec-pip ${state}`;
}

async function generateSection(idx) {
  currentSec = idx;
  renderProgressPips();
  document.getElementById('finishBtn').style.display = 'none';

  // Show loading card
  document.getElementById('sectionContainer').innerHTML = `
    <div class="section-card">
      <div class="section-card-hd">
        <h3>${sections[idx].title}</h3>
        <span>${idx+1} / ${sections.length}</span>
      </div>
      <div class="section-card-body">
        <div class="loading-inline"><div class="spinner-sm"></div> 노트 생성 중...</div>
      </div>
    </div>`;

  const isTextbook = files.some(f => f.type === 'textbook');
  const isLecture  = files.some(f => f.type === 'lecture');
  let srcHint = isTextbook && isLecture ? '강의안과 교재 필기' : isTextbook ? '교재 필기' : '강의안';

  const contentBlocks = [];
  files.forEach(f => {
    contentBlocks.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: f.b64 } });
  });
  contentBlocks.push({
    type: 'text',
    text: `위 ${srcHint} PDF에서 "${sections[idx].title}" 섹션 (${sections[idx].desc})에 해당하는 내용만 추출해 노트로 만드세요.

[절대 규칙]
- 이 섹션에 해당하는 모든 내용을 빠짐없이 포함
- 교재 필기: 형광펜·밑줄·손글씨 메모 최우선
- 강의안: 모든 슬라이드 내용 + 강조 표시 반영
- 항목은 단어/구 위주로 압축 (15자 이내)

출력 형식 (JSON만):
{"left":[{"section":"소섹션명","items":[{"text":"내용","type":"normal|imp|exam|add|tip"}]}],"right":[...]}

JSON만 출력.`
  });

  try {
    const txt = await callClaude({ messages: [{ role: 'user', content: contentBlocks }] });
    sections[idx].note = parseJSON(txt);
    sections[idx].done = false;
    renderSectionCard(idx);
  } catch(e) {
    document.getElementById('sectionContainer').innerHTML =
      `<div class="section-card"><div class="section-card-body">⚠️ 오류: ${e.message}</div></div>`;
  }
}

function renderSectionCard(idx, feedbackMsg) {
  const sec = sections[idx];
  const noteHTML = renderNoteContent(sec.note);

  const feedbackVal = feedbackMsg || '';

  document.getElementById('sectionContainer').innerHTML = `
    <div class="section-card">
      <div class="section-card-hd">
        <h3>${sec.title}</h3>
        <span>${idx+1} / ${sections.length}</span>
      </div>
      <div class="section-card-body">
        ${noteHTML}
        <div class="feedback-area">
          <textarea class="feedback-input" id="feedbackInput" rows="2"
            placeholder="수정 요청 (예: "혈당 수치 더 자세히", "인슐린 종류 추가") — 없으면 바로 다음으로"
          >${feedbackVal}</textarea>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="applyFeedback(${idx})">🔄 수정</button>
            <button class="btn btn-green btn-sm" onclick="confirmSection(${idx})">✅ 확인</button>
          </div>
        </div>
      </div>
    </div>`;
}

function renderNoteContent(note) {
  const col = arr => (arr||[]).map(s => `
    <div class="note-sec-title">${s.section}</div>
    ${(s.items||[]).map(i =>
      `<div class="note-item ${i.type==='normal'?'':i.type}">${i.text}</div>`
    ).join('')}
  `).join('');
  return `<div class="note-two-col">
    <div class="note-col">${col(note.left)}</div>
    <div class="note-col-div"></div>
    <div class="note-col">${col(note.right)}</div>
  </div>`;
}

async function applyFeedback(idx) {
  const feedback = document.getElementById('feedbackInput').value.trim();
  if (!feedback) return;

  document.getElementById('sectionContainer').innerHTML = `
    <div class="section-card">
      <div class="section-card-hd"><h3>${sections[idx].title}</h3><span>${idx+1} / ${sections.length}</span></div>
      <div class="section-card-body">
        <div class="loading-inline"><div class="spinner-sm"></div> 수정 중...</div>
      </div>
    </div>`;

  const contentBlocks = [];
  files.forEach(f => {
    contentBlocks.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: f.b64 } });
  });
  contentBlocks.push({
    type: 'text',
    text: `"${sections[idx].title}" 섹션 노트를 다음 요청에 따라 수정하세요:

수정 요청: ${feedback}

현재 노트:
${JSON.stringify(sections[idx].note)}

수정된 노트를 동일한 JSON 형식으로 출력하세요 (JSON만):
{"left":[...],"right":[...]}`
  });

  try {
    const txt = await callClaude({ messages: [{ role: 'user', content: contentBlocks }] });
    sections[idx].note = parseJSON(txt);
    renderSectionCard(idx, feedback);
  } catch(e) {
    renderSectionCard(idx);
  }
}

async function confirmSection(idx) {
  sections[idx].done = true;
  updatePip(idx, 'done');

  const next = idx + 1;
  if (next < sections.length) {
    await generateSection(next);
  } else {
    // All done
    document.getElementById('sectionContainer').innerHTML = `
      <div class="ai-message" style="text-align:center;padding:24px">
        🎉 모든 섹션이 완성됐어요!<br>
        <strong>노트 완성</strong> 버튼을 눌러 최종 노트를 확인하세요.
      </div>`;
    document.getElementById('finishBtn').style.display = '';
  }
}

// ════════════════════════════════════════
// STEP 4 — FINAL NOTE
// ════════════════════════════════════════
function goStep4() {
  goStep(4);
  renderFinalNote();
}

function renderFinalNote() {
  const title = document.getElementById('noteTitle').value.trim() || '간호학 노트';
  const date  = document.getElementById('noteDate').value.trim()  || new Date().toLocaleDateString('ko-KR');

  // Merge all section notes into two columns
  const allSections = [];
  sections.forEach(sec => {
    if (!sec.note) return;
    [...(sec.note.left||[]), ...(sec.note.right||[])].forEach(s => allSections.push(s));
  });
  const half = Math.ceil(allSections.length / 2);
  const merged = { left: allSections.slice(0, half), right: allSections.slice(half) };

  const types = files.map(f => f.type);
  const tagHTML = types.includes('lecture') && types.includes('textbook')
    ? `<span class="tag mixed">📑 강의안 + 📚 교재 통합</span>`
    : types.includes('textbook')
      ? `<span class="tag textbook">📚 교재 필기</span>`
      : `<span class="tag lecture">📑 강의안</span>`;

  const col = arr => (arr||[]).map(s => `
    <div class="note-sec-title">${s.section}</div>
    ${(s.items||[]).map(i =>
      `<div class="note-item ${i.type==='normal'?'':i.type}">${i.text}</div>`
    ).join('')}
  `).join('');

  window._finalNoteData = { title, date, merged, tagHTML };

  document.getElementById('finalNote').innerHTML = `
    <div class="final-note" id="finalNoteContent">
      <div class="final-title-bar">
        <h2>${title}</h2>
        <div class="final-meta">${date} &nbsp;|&nbsp; ${tagHTML}</div>
      </div>
      <div class="note-two-col">
        <div class="note-col">${col(merged.left)}</div>
        <div class="note-col-div"></div>
        <div class="note-col">${col(merged.right)}</div>
      </div>
    </div>`;
}

function downloadPDF() {
  const { title, date, merged, tagHTML } = window._finalNoteData || {};
  if (!merged) return;

  const col = arr => (arr||[]).map(s => `
    <div class="note-sec-title">${s.section}</div>
    ${(s.items||[]).map(i =>
      `<div class="note-item ${i.type==='normal'?'':i.type}">${i.text}</div>`
    ).join('')}
  `).join('');

  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head>
<meta charset="UTF-8"><title>${title}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;padding:28px 36px;color:#1a1a1a;}
.legend{display:flex;flex-wrap:wrap;gap:6px 16px;margin-bottom:14px;font-size:0.7rem;color:#555;}
.legend span{display:flex;align-items:center;gap:4px;}
.ldot{width:9px;height:9px;border-radius:50%;}
.final-title-bar{text-align:center;margin-bottom:16px;padding-bottom:11px;border-bottom:2.5px solid #1a1a1a;}
.final-title-bar h2{font-family:'Noto Serif KR',serif;font-size:1.2rem;font-weight:700;}
.final-meta{font-size:0.72rem;color:#999;margin-top:4px;}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:10px;font-size:0.68rem;font-weight:700;}
.tag.mixed{background:#f3e5f5;color:#6a1b9a;}
.tag.lecture{background:#e3f2fd;color:#0d47a1;}
.tag.textbook{background:#fff3e0;color:#e65100;}
.note-two-col{display:grid;grid-template-columns:1fr 1px 1fr;gap:0 22px;}
.note-col-div{background:#ccc;}
.note-sec-title{font-weight:700;font-size:0.85rem;border-bottom:1px solid #ccc;padding-bottom:3px;margin:14px 0 7px;}
.note-sec-title:first-child{margin-top:0;}
.note-item{font-size:0.78rem;line-height:1.65;margin-bottom:4px;padding:1px 6px 1px 8px;border-left:2px solid transparent;border-radius:2px;}
.note-item::before{content:'· ';}
.note-item.imp{color:#c0392b;border-left-color:#c0392b;}
.note-item.exam{background:#fff9c4;border-left-color:#f9a825;}
.note-item.add{color:#1565c0;border-left-color:#1565c0;}
.note-item.tip{color:#2e7d32;border-left-color:#2e7d32;font-style:italic;}
</style></head><body>
<div class="legend">
  <span><div class="ldot" style="background:#1a1a1a"></div>목차/타이틀</span>
  <span><div class="ldot" style="background:#c0392b"></div>교수 강조</span>
  <span><div class="ldot" style="background:#f9a825"></div>시험 출제</span>
  <span><div class="ldot" style="background:#1565c0"></div>보충 설명</span>
  <span><div class="ldot" style="background:#2e7d32"></div>암기 팁</span>
</div>
<div class="final-note">
  <div class="final-title-bar">
    <h2>${title}</h2>
    <div class="final-meta">${date} &nbsp;|&nbsp; ${tagHTML}</div>
  </div>
  <div class="note-two-col">
    <div class="note-col">${col(merged.left)}</div>
    <div class="note-col-div"></div>
    <div class="note-col">${col(merged.right)}</div>
  </div>
</div>
<script>window.onload=()=>{window.print();}<\/script>
</body></html>`);
  w.document.close();
}
</script>
</body>
</html>
